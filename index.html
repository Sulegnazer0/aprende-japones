<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aprende Japonés - Panel de Práctica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor" style="max-width: 500px;"> <div class="tabs-navegacion">
            <button id="tab-practica" class="btn-tab activo">✏️ Modo Práctica</button>
            <button id="tab-estudio" class="btn-tab">📚 Modo Estudio</button>
        </div>

        <div id="seccion-practica">
            <select id="selector-modo" class="selector-modo">
                <option value="todos">Todos los caracteres (Mezclado)</option>
                <option value="hiragana">Solo Hiragana</option>
                <option value="katakana">Solo Katakana</option>
                <option value="kanji">Solo Kanji</option>
            </select>

            <select id="selector-progreso" class="selector-modo" style="margin-top: -10px; background-color: #f8fafc;">
                <option value="todos">📋 Todo el vocabulario</option>
                <option value="faltan">⏳ Solo las que me faltan</option>
                <option value="examen">🧠 Modo Examen (Solo lo que ya sé)</option>
            </select>

            <div class="tarjeta-pregunta">
                <span id="info-tipo" class="etiqueta">Cargando...</span>
                <h1 id="texto-significado">Cargando vocabulario...</h1>
                <p id="pista-romaji" class="pista"></p>
            </div>

            <canvas id="pizarra" width="320" height="320"></canvas>
            
            <div class="controles-pizarra">
                <button id="btn-limpiar" class="btn-secundario">Limpiar</button>
                <button id="btn-revelar" class="btn-primario">Revelar Respuesta</button>
            </div>

            <div id="panel-respuesta" class="panel-respuesta oculto">
                <div class="caracter-correcto" id="resp-caracter">?</div>
                <div class="detalles-grid">
                    <p id="fila-romaji"><strong>Romaji:</strong> <span id="resp-romaji">-</span></p>
                    <p id="fila-categoria"><strong>Categoría:</strong> <span id="resp-categoria">-</span></p>
                    
                    <p id="fila-contraparte"><strong>Contraparte:</strong> <span id="resp-contraparte">-</span></p>
                    <p id="fila-palabra"><strong>Ejemplo:</strong> <span id="resp-palabra">-</span></p>
                    
                    <p id="fila-id"><strong>Nº Lista:</strong> <span id="resp-id">-</span></p>
                    <p id="fila-onyomi"><strong>Onyomi:</strong> <span id="resp-onyomi">-</span></p>
                    <p id="fila-kunyomi"><strong>Kunyomi:</strong> <span id="resp-kunyomi">-</span></p>
                </div>
                
                <div class="controles-pizarra" style="margin-top: 15px;">
                    <button id="btn-no-sabe" style="background-color: #ef4444; color: white; width: 50%;">❌ No la supe</button>
                    <button id="btn-sabe" style="background-color: #10b981; color: white; width: 50%;">✅ ¡La supe!</button>
                </div>
            </div>
        </div>

        <div id="seccion-estudio" class="oculto">
            <div class="filtros-estudio">
                <input type="text" id="buscador-texto" placeholder="Buscar significado o romaji (ej. agua, a, mizu)...">
                <select id="filtro-nivel">
                    <option value="todos">Todos los niveles</option>
                    <option value="basico">Kana (Básico)</option>
                    <option value="N5">Kanji N5</option>
                    </select>
            </div>
            
            <div id="lista-diccionario" class="grid-diccionario"></div>
        </div>
<div id="modal-detalles" class="modal oculto">
            <div class="modal-contenido">
                <span id="cerrar-modal" class="cerrar-btn">&times;</span>
                <div class="caracter-correcto" id="modal-caracter">?</div>
                <h3 id="modal-romaji" style="color: #3b82f6; margin-bottom: 10px;">-</h3>
                <p id="modal-significado" style="font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #1e293b;">-</p>

                <div class="detalles-grid">
                    <p><strong>Categoría:</strong> <span id="modal-categoria">-</span></p>

                    <p id="modal-fila-contraparte"><strong>Contraparte:</strong> <span id="modal-contraparte">-</span></p>
                    <p id="modal-fila-palabra"><strong>Ejemplo:</strong> <span id="modal-palabra">-</span></p>

                    <p id="modal-fila-id"><strong>Nº Lista:</strong> <span id="modal-id">-</span></p>
                    <p id="modal-fila-onyomi"><strong>Onyomi:</strong> <span id="modal-onyomi">-</span></p>
                    <p id="modal-fila-kunyomi"><strong>Kunyomi:</strong> <span id="modal-kunyomi">-</span></p>
                </div>
            </div>
        </div>
        
    </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
